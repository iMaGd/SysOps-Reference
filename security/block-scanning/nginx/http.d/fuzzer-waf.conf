############################################
## Nginx lightweight WAF â€“ fuzzer & exploit detection
## Scope: http {}
## Safe for ServerPilot
############################################

############################################
# 1. Suspicious request paths
############################################

map $request_uri $is_bad_path {
    default 0;

    # Environment / config leaks
    ~*^/\.env                1;
    ~*\.env$                 1;
    ~*^/\.git                1;
    ~*^/\.svn                1;
    ~*\.ini$                 1;
    ~*\.yml$                 1;
    ~*\.yaml$                1;
    ~*\.conf$                1;
    ~*\.dev$                 1;
    ~*\.lock$                1;
    ~*\.pem$                 1;
    ~*\.key$                 1;
    ~*\.crt$                 1;
    ~*\.webconfig$           1;
    ~*composer\.json$        1;
    ~*package\.json$         1;
    ~*package-lock\.json$    1;
    ~*swagger\.json$         1;
    ~*swagger\.json$         1;
    ~*aws\.config\.js$       1;
    ~*Dockerfile$            1;
    ~*\.htaccess$            1;
    ~*\.htpasswd$            1;
    ~*\.example$             1;

    # Executable files
    ~*\.sh$                  1;
    ~*\.dll$                 1;
    ~*\.exe$                 1;
    ~*\.bat$                 1;
    ~*\.cmd$                 1;
    ~*\.ps1$                 1;

    # Archives, backups
    ~*\.sql$                 1;
    ~*\.bak$                 1;
    ~*\.old$                 1;
    ~*\.log$                 1;
    ~*\.save$                1;
    ~*\.backup$              1;
    ~*\.copy$                1;
    ~*\.orig$                1;
    ~*\.dist$                1;
    ~*\.swp$                 1;
    ~*\.tmp$                 1;

    # Only ones in the root directory
    ~*^/[^/]*\.zip$          1;
    ~*^/[^/]*\.tar$          1;
    ~*^/[^/]*\.gz$           1;

    # CMS / web app directories
    ~*^/wp-                  1;
    ~*^/wordpress            1;
    ~*^/phpmyadmin           1;
    ~*^/webjars              1;
    ~*^/_next                1;
    ~*^/joomla               1;
    ~*^/administrator        1;
    ~*^/magento              1;
    ~*^/node_modules         1;
    ~*^/vendor/              1;
    ~*^/cgi-bin/             1;
    ~*^/php-cgi/             1;

    # Other
    ~*\.DS_Store$            1;

    # PHP files other than index.php, import.php, export.php,
    # redirects.php, redirect.php, admin.php
    ~*^/(?!index|import|export|redirects|redirect|admin)\.php 1;

    # PHP backup files
    ~*\.php-back$            1;
    ~*\.php\.back$           1;
    ~*\.php1$                1;
    ~*\.php2$                1;
    ~*install.php$           1;
}

############################################
# 2. Suspicious HTTP methods
############################################

map $request_method $is_bad_method {
    default 0;
    TRACE   1;
    TRACK   1;
    CONNECT 1;
}

############################################
# 3. Suspicious User-Agents (weak signal)
############################################

map $http_user_agent $is_bad_ua {
    default 0;

    ~*fuzz       1;
    ~*scanner    1;
}

############################################
# 4. Advanced exploit patterns (from logs)
############################################

map $request_uri $is_exploit_uri {
    default 0;

    #
    # Path traversal (raw, encoded, unicode)
    #
    ~*\.\./\.\.                   1;
    ~*%2e%2e                      1;
    ~*%u002e                      1;
    ~*%2f%2e%2e                   1;
    ~*\.%2e                       1;
    ~*%2e\.                       1;

    #
    # Non-printable / binary probes
    #
    ~*\\x[0-9][0-9][a-z]?         1;

    #
    # Sensitive file probing
    #
    ~*etc/passwd                  1;
    ~*boot\.ini                   1;
    ~*win\.ini                    1;

    #
    # Null byte injection
    #
    ~*%00                         1;

    #
    # Header injection / CRLF
    #
    ~*%0d                         1;
    ~*%0a                         1;
    ~*%0m                         1;
    ~*%0j                         1;

    #
    # XSS probing (obvious payloads)
    #
    ~*<script                     1;
    ~*<svg                        1;
    ~*onload\s*=                  1;
    ~*alert\s*\(                  1;
    ~*javascript:                 1;
    ~*onerror\s*=                 1;
    ~*onmouseover\s*=             1;
    ~*onclick\s*=                 1;

    #
    # Java / enterprise app probing
    #
    ~*\.jsp$                      1;
    ~*/servlet/                   1;
    ~*plugin-admin                1;

    # PHP eval() from stdin
    ~*eval-stdin\.php             1;

    #
    # File inclusion patterns
    #
    ~*php://                      1;
    ~*expect://                   1;
    ~*data://                     1;

    # Routex requests
    ~*routex\.v\.                 1;
}

############################################
# 5. Final fuzzer decision (single source)
############################################

map "$is_bad_path$is_bad_method$is_bad_ua$is_exploit_uri" $block_fuzzer {
    default 0;

    # Any strong signal â†’ block
    ~*1                           1;
}
